version: "3.7"

services:
  bridge:
    image: rafftyl/nostr-ntfy:1.3.0
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/data

  app_proxy:
    environment:
      APP_HOST: bridge
      APP_PORT: 8181
      PROXY_AUTH_ADD: "false"
    depends_on:
      - bridge
    restart: on-failure